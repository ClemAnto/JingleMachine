<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jingle Machine — Helper (test)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1f2430;
      }
      h1 { font-size: 1.4rem; }
      section {
        border: 1px solid #d7dbe3;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      h2 { font-size: 1rem; margin-top: 0; }
      label { display: block; font-size: 0.85rem; margin: 0.5rem 0 0.2rem; }
      input {
        width: 100%;
        padding: 0.45rem;
        border: 1px solid #c3c9d4;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .row { display: flex; gap: 0.75rem; }
      .row > div { flex: 1; }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 0.9rem;
        border: 0;
        border-radius: 6px;
        background: #3b5bdb;
        color: #fff;
        cursor: pointer;
      }
      button.secondary { background: #5c6573; }
      #status { font-weight: 600; }
      #thumb { max-width: 240px; border-radius: 6px; margin-top: 0.5rem; }
      #logs {
        width: 100%;
        height: 220px;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>🎛️ Helper Jingle Machine — pagina di test</h1>

    <section>
      <h2>1. Stato (health)</h2>
      <p>Stato: <span id="status">—</span></p>
      <button id="checkHealth">Controlla stato</button>
    </section>

    <section>
      <h2>2. Metadati del video (info)</h2>
      <label for="infoUrl">URL YouTube</label>
      <input id="infoUrl" placeholder="https://www.youtube.com/watch?v=..." />
      <button id="getInfo">Leggi metadati</button>
      <div id="infoResult"></div>
    </section>

    <section>
      <h2>3. Estrai MP3 (extract)</h2>
      <label for="extractUrl">URL YouTube</label>
      <input id="extractUrl" placeholder="https://www.youtube.com/watch?v=..." />
      <div class="row">
        <div>
          <label for="start">Inizio (secondi, opz.)</label>
          <input id="start" type="number" min="0" placeholder="es. 10" />
        </div>
        <div>
          <label for="end">Fine (secondi, opz.)</label>
          <input id="end" type="number" min="0" placeholder="es. 25" />
        </div>
      </div>
      <button id="extract">Estrai e scarica MP3</button>
      <div id="player"></div>
    </section>

    <section>
      <h2>Log</h2>
      <textarea id="logs" readonly></textarea>
      <button id="refreshLogs" class="secondary">Aggiorna log dal server</button>
      <button id="clearLogs" class="secondary">Pulisci</button>
    </section>

    <script>
      const logsBox = document.getElementById("logs");

      // Appends a timestamped line to the log textbox.
      function log(message) {
        const time = new Date().toLocaleTimeString();
        logsBox.value += `${time}  ${message}\n`;
        logsBox.scrollTop = logsBox.scrollHeight;
      }

      // Pulls the server-side logs and shows them.
      async function refreshLogs() {
        try {
          const response = await fetch("/logs");
          const data = await response.json();
          logsBox.value = data.lines.join("\n") + "\n";
          logsBox.scrollTop = logsBox.scrollHeight;
        } catch (error) {
          log(`Impossibile leggere i log: ${error.message}`);
        }
      }

      document.getElementById("checkHealth").onclick = async () => {
        log("Controllo stato...");
        try {
          const data = await (await fetch("/health")).json();
          const label = data.ready ? "🟢 pronto" : "🟡 in preparazione";
          document.getElementById("status").textContent = label;
          log(`Stato: ${label} — ${JSON.stringify(data.versions)}`);
        } catch (error) {
          document.getElementById("status").textContent = "🔴 non raggiungibile";
          log(`Errore stato: ${error.message}`);
        }
      };

      document.getElementById("getInfo").onclick = async () => {
        const url = document.getElementById("infoUrl").value.trim();
        if (!url) return log("Inserisci un URL per i metadati.");
        log(`Leggo metadati: ${url}`);
        try {
          const data = await (await fetch("/info?url=" + encodeURIComponent(url))).json();
          if (data.error) throw new Error(data.error);
          document.getElementById("infoResult").innerHTML =
            `<p><b>${data.title}</b><br>Autore: ${data.uploader}<br>` +
            `Durata: ${data.durationSeconds}s</p>` +
            (data.thumbnail ? `<img id="thumb" src="${data.thumbnail}" />` : "");
          log("Metadati ricevuti.");
        } catch (error) {
          log(`Errore metadati: ${error.message}`);
        }
      };

      document.getElementById("extract").onclick = async () => {
        const url = document.getElementById("extractUrl").value.trim();
        if (!url) return log("Inserisci un URL da estrarre.");
        const start = document.getElementById("start").value;
        const end = document.getElementById("end").value;
        const body = { url };
        if (start !== "" && end !== "") {
          body.start = Number(start);
          body.end = Number(end);
        }
        log(`Estraggo: ${url}...`);
        try {
          const response = await fetch("/extract", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || response.statusText);
          }
          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          document.getElementById("player").innerHTML =
            `<audio controls src="${objectUrl}"></audio>` +
            `<br><a href="${objectUrl}" download="jingle.mp3">Scarica jingle.mp3</a>`;
          log("MP3 ricevuto.");
        } catch (error) {
          log(`Errore estrazione: ${error.message}`);
        }
      };

      document.getElementById("refreshLogs").onclick = refreshLogs;
      document.getElementById("clearLogs").onclick = () => (logsBox.value = "");

      log("Pagina pronta. Inizia controllando lo stato.");
    </script>
  </body>
</html>
