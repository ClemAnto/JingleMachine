<div class="flex justify-center pt-8">
  <nz-card class="w-full max-w-md shadow-sm" [nzTitle]="mode() === 'login' ? 'Accedi' : 'Crea account'">
    @if (error()) {
      <nz-alert nzType="error" [nzMessage]="error()!" class="mb-4" nzShowIcon></nz-alert>
    }

    <form nz-form nzLayout="vertical" [formGroup]="form" (ngSubmit)="submit()">
      <nz-form-item>
        <nz-form-label nzRequired>Email</nz-form-label>
        <nz-form-control nzErrorTip="Inserisci un'email valida.">
          <input nz-input type="email" formControlName="email" placeholder="nome@esempio.it" autocomplete="email" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Password</nz-form-label>
        <nz-form-control nzErrorTip="Almeno 6 caratteri.">
          <input nz-input type="password" formControlName="password" placeholder="••••••" autocomplete="current-password" />
        </nz-form-control>
      </nz-form-item>

      <button nz-button nzType="primary" nzBlock [nzLoading]="loading()" [disabled]="loading()" type="submit">
        {{ mode() === 'login' ? 'Accedi' : 'Registrati' }}
      </button>
    </form>

    <div class="my-3 text-center text-xs text-slate-400">oppure</div>

    <button nz-button nzBlock (click)="google()" [disabled]="loading()" type="button">
      <span nz-icon nzType="google"></span>
      Continua con Google
    </button>

    <div class="mt-4 text-center text-sm">
      @if (mode() === 'login') {
        <span class="text-slate-500">Non hai un account?</span>
        <a class="text-indigo-600 ml-1" (click)="toggleMode()">Registrati</a>
      } @else {
        <span class="text-slate-500">Hai già un account?</span>
        <a class="text-indigo-600 ml-1" (click)="toggleMode()">Accedi</a>
      }
    </div>
  </nz-card>
</div>
