<nz-modal
  [nzVisible]="visible()"
  nzTitle="Crea nuovo Jingle"
  [nzFooter]="footer"
  [nzWidth]="600"
  (nzOnCancel)="close()"
>
  <ng-container *nzModalContent>
    <nz-spin [nzSpinning]="saving()">
      <div class="space-y-5 py-2">

        <!-- Audio + Image upload -->
        <div class="flex flex-col sm:flex-row gap-4">
          @if (preparedAudio()) {
            <!-- Audio already extracted from YouTube and uploaded -->
            <div class="relative flex flex-col items-center justify-center gap-2 p-5 rounded-lg border border-dashed border-primary/50 bg-primary/5 flex-1">
              <span nz-icon nzType="youtube" class="text-2xl text-primary"></span>
              <span class="text-sm font-semibold text-center text-fg">Audio da YouTube pronto</span>
              @if (audioPreviewUrl()) {
                <button
                  type="button"
                  class="absolute top-2 right-2 flex items-center justify-center w-9 h-9 rounded-full bg-black/40 text-white hover:bg-black/60 transition-colors"
                  [attr.aria-label]="previewPlaying() ? 'Ferma' : 'Ascolta'"
                  (click)="togglePreview()"
                >
                  <span nz-icon [nzType]="previewPlaying() ? 'pause-circle' : 'play-circle'" class="text-2xl"></span>
                </button>
              }
            </div>
          } @else {
            <label class="relative flex flex-col items-center justify-center gap-2 p-5 rounded-lg border border-dashed border-primary/50 bg-primary/5 cursor-pointer hover:bg-primary/10 transition-colors flex-1">
              <input type="file" accept="audio/*,.mp3" class="hidden" (change)="onAudioSelected($event)" />
              <span nz-icon nzType="audio" class="text-2xl" [class.text-fg]="audioFile()" [class.text-primary]="!audioFile()"></span>
              <span class="text-sm font-semibold text-center break-all">
                {{ audioFile() ? audioFile()!.name : 'Carica file audio' }}
              </span>
              @if (audioPreviewUrl()) {
                <button
                  type="button"
                  class="absolute top-2 right-2 flex items-center justify-center w-9 h-9 rounded-full bg-black/40 text-white hover:bg-black/60 transition-colors"
                  [attr.aria-label]="previewPlaying() ? 'Ferma' : 'Ascolta'"
                  (click)="$event.preventDefault(); $event.stopPropagation(); togglePreview()"
                >
                  <span nz-icon [nzType]="previewPlaying() ? 'pause-circle' : 'play-circle'" class="text-2xl"></span>
                </button>
              }
            </label>
          }

          <ui-image-picker
            class="flex-1"
            heightClass="min-h-24"
            [src]="imagePreview()"
            [(position)]="imagePosition"
            (fileSelected)="onImageSelected($event)"
          />
        </div>

        <!-- Name -->
        <input nz-input placeholder="Nome Jingle" [ngModel]="name()" (ngModelChange)="name.set($event)" />

        <!-- Tags -->
        <ui-tag-input [tags]="tags()" (tagsChange)="tags.set($event)" />

        <!-- Colour picker -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Colore scheda</p>
          <ui-color-picker [value]="color()" (valueChange)="color.set($event)" />
        </div>

        <!-- Playback volume -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Volume di riproduzione</p>
          <div class="flex items-center gap-3">
            <span nz-icon nzType="sound" class="text-muted"></span>
            <nz-slider
              class="flex-1"
              [nzMin]="0"
              [nzMax]="100"
              nzTooltipVisible="never"
              [ngModel]="volume()"
              (ngModelChange)="volume.set($event)"
            ></nz-slider>
            <span class="text-sm text-muted w-10 text-right">{{ volume() }}%</span>
          </div>
        </div>

        <!-- Voice trigger + microphone test -->
        <app-trigger-phrase-field [(phrase)]="triggerPhrase" />

      </div>
    </nz-spin>
  </ng-container>
</nz-modal>

<ng-template #footer>
  <button ui-button variant="primary" class="w-full justify-center" [disabled]="saving()" (click)="save()">
    <span nz-icon nzType="upload"></span>
    {{ saving() ? 'Caricamento...' : 'Crea Jingle' }}
  </button>
</ng-template>
