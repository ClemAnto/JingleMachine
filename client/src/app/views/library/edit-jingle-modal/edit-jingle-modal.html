<nz-modal
  [nzVisible]="visible()"
  nzTitle="Modifica Jingle"
  [nzFooter]="footer"
  [nzWidth]="600"
  (nzOnCancel)="close()"
>
  <ng-container *nzModalContent>
    <nz-spin [nzSpinning]="saving()">
      <div class="flex flex-col gap-6">

        <!-- Cover image -->
        <ui-image-picker
          heightClass="min-h-32"
          [src]="imagePreview()"
          [(position)]="imagePosition"
          (fileSelected)="onImageSelected($event)"
        />

        <!-- Name -->
        <input nz-input placeholder="Nome Jingle" [ngModel]="name()" (ngModelChange)="name.set($event)" />

        <!-- Tags -->
        <ui-tag-input [tags]="tags()" (tagsChange)="tags.set($event)" />

        <!-- Colour picker -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Colore scheda</p>
          <ui-color-picker [value]="color()" (valueChange)="color.set($event)" />
        </div>

        <!-- Playback volume -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Volume di riproduzione</p>
          <div class="flex items-center gap-3">
            <span nz-icon nzType="sound" class="text-muted"></span>
            <nz-slider
              class="flex-1"
              [nzMin]="0"
              [nzMax]="100"
              nzTooltipVisible="never"
              [ngModel]="volume()"
              (ngModelChange)="volume.set($event)"
            ></nz-slider>
            <span class="text-sm text-muted w-10 text-right">{{ volume() }}%</span>
          </div>
        </div>

        <!-- Voice trigger + microphone test -->
        <app-trigger-phrase-field [(phrase)]="triggerPhrase" />

      </div>
    </nz-spin>
  </ng-container>
</nz-modal>

<ng-template #footer>
  <div class="flex items-center gap-3">
    <button ui-button variant="alert" [disabled]="saving()" (click)="confirmDelete()">
      <span nz-icon nzType="delete"></span>
      <span class="hidden sm:inline">Elimina</span>
    </button>
    <button ui-button variant="primary" class="flex-1 justify-center" [disabled]="saving()" (click)="save()">
      <span nz-icon nzType="save"></span>
      {{ saving() ? 'Salvataggio...' : 'Salva modifiche' }}
    </button>
  </div>
</ng-template>
