<nz-modal
  [nzVisible]="visible()"
  nzTitle="Modifica Jingle"
  [nzFooter]="footer"
  [nzWidth]="600"
  (nzOnCancel)="close()"
>
  <ng-container *nzModalContent>
    <nz-spin [nzSpinning]="saving()">
      <div class="space-y-5 py-2">

        <!-- Cover image -->
        <label
          class="relative flex flex-col items-center justify-center gap-2 rounded-lg cursor-pointer transition-colors overflow-hidden min-h-32"
          [class]="imagePreview() ? 'border border-primary/40' : 'p-5 border border-dashed border-primary/50 bg-primary/5 hover:bg-primary/10'"
        >
          <input type="file" accept="image/*" class="hidden" (change)="onImageSelected($event)" />
          @if (imagePreview()) {
            <img [src]="imagePreview()!" alt="Anteprima immagine" class="absolute inset-0 w-full h-full object-cover" />
            <span class="absolute inset-x-0 bottom-0 px-3 py-1.5 text-xs font-semibold text-white truncate bg-linear-to-t from-black/70 to-transparent">
              {{ imageFile()?.name ?? 'Sostituisci immagine' }}
            </span>
          } @else {
            <span nz-icon nzType="picture" class="text-2xl text-primary"></span>
            <span class="text-sm font-semibold text-center">Carica immagine</span>
          }
        </label>

        <!-- Name -->
        <input nz-input placeholder="Nome Jingle" [ngModel]="name()" (ngModelChange)="name.set($event)" />

        <!-- Tags -->
        <ui-tag-input [tags]="tags()" (tagsChange)="tags.set($event)" />

        <!-- Colour picker -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Colore scheda</p>
          <ui-color-picker [value]="color()" (valueChange)="color.set($event)" />
        </div>

        <!-- Playback volume -->
        <div class="space-y-2">
          <p class="text-sm font-semibold text-fg">Volume di riproduzione</p>
          <div class="flex items-center gap-3">
            <span nz-icon nzType="sound" class="text-muted"></span>
            <nz-slider
              class="flex-1"
              [nzMin]="0"
              [nzMax]="100"
              nzTooltipVisible="never"
              [ngModel]="volume()"
              (ngModelChange)="volume.set($event)"
            ></nz-slider>
            <span class="text-sm text-muted w-10 text-right">{{ volume() }}%</span>
          </div>
        </div>

      </div>
    </nz-spin>
  </ng-container>
</nz-modal>

<ng-template #footer>
  <button ui-button variant="primary" class="w-full justify-center" [disabled]="saving()" (click)="save()">
    <span nz-icon nzType="save"></span>
    {{ saving() ? 'Salvataggio...' : 'Salva modifiche' }}
  </button>
</ng-template>
