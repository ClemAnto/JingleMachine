<div class="flex flex-col min-h-screen bg-page overflow-x-hidden">

  <!-- ── Header ── -->
  <header class="flex flex-wrap items-center justify-between gap-4 p-4 sm:p-10">
    <div class="flex items-center gap-3">
      <span nz-icon nzType="sound" class="text-primary text-2xl sm:text-3xl"></span>
      <span class="text-primary font-bold text-xl sm:text-2xl tracking-widest uppercase">Jingle Machine</span>
    </div>

    <div class="flex items-center gap-3 sm:gap-5">
      <button ui-button variant="primary" (click)="openCreate()">
        <span nz-icon nzType="plus"></span>
        <span class="hidden sm:inline">Aggiungi file</span>
      </button>
      @if (youtubeAvailable()) {
        <button ui-button variant="youtube" (click)="openYoutube()">
          <span nz-icon nzType="youtube"></span>
          <span class="hidden sm:inline">Carica da YouTube</span>
        </button>
      }
      <button ui-button variant="neutral" (click)="logout()">
        <span nz-icon nzType="logout" class="text-white/60"></span>
      </button>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="flex flex-col flex-1 min-w-0 px-4 pb-4 sm:px-10 sm:pb-10">
    <div class="bg-surface rounded-2xl p-5 sm:p-10 lg:p-15 flex-1 flex flex-col gap-6 sm:gap-10 min-w-0 w-full">

      <!-- Title + search -->
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between min-w-0">
        <h1 class="text-2xl sm:text-3xl font-semibold text-fg">I tuoi Jingle</h1>
        <!-- Search only makes sense with a few items: hide it below 2 jingles. -->
        @if (jingles().length >= 2) {
          <div class="flex items-center gap-2 h-(--control-height) px-5 rounded-full bg-control cursor-text w-full sm:w-auto min-w-0">
            <span nz-icon nzType="search" class="text-muted"></span>
            <input
              class="bg-transparent border-none outline-none text-fg placeholder:text-muted text-lg font-semibold min-w-0 flex-1 sm:flex-none sm:w-48"
              placeholder="Cerca..."
              [ngModel]="search()"
              (ngModelChange)="search.set($event)"
            />
          </div>
        }
      </div>

      <!-- Grid -->
      <nz-spin [nzSpinning]="loading()">
        @if (filtered().length === 0 && !loading()) {
          <div class="flex flex-col items-center justify-center py-20 text-white/25">
            <span nz-icon nzType="sound" class="text-6xl mb-4"></span>
            <p class="text-lg">Nessun jingle trovato.</p>
          </div>
        } @else {
          <!-- "mixed" orientation: the drop list follows the grid's wrapping layout.
               Reordering is disabled while searching (indexes would not match the full list). -->
          <div
            class="grid grid-cols-4 gap-6.5 max-[1200px]:grid-cols-3 max-[900px]:grid-cols-2 max-[600px]:grid-cols-1"
            cdkDropList
            cdkDropListOrientation="mixed"
            [cdkDropListDisabled]="reorderDisabled()"
            (cdkDropListDropped)="onReorder($event)"
          >
            @for (jingle of filtered(); track jingle.id) {
              <app-jingle-item
                cdkDrag
                [jingle]="jingle"
                (editRequest)="openEdit($event)"
                (deleteRequest)="confirmDelete($event)"
              />
            }
          </div>
        }
      </nz-spin>

    </div>
  </main>

</div>

<!-- Modals -->
<app-youtube-import-modal (imported)="onYoutubeImported($event)" />
<app-create-jingle-modal (saved)="onSaved()" />
<app-edit-jingle-modal (saved)="onSaved()" />
