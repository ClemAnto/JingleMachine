<div class="grid grid-rows-[140px_1fr] min-h-screen bg-page">

  <!-- ── Header ── -->
  <header class="flex items-center justify-between p-10">
    <div class="flex items-center gap-3">
      <span nz-icon nzType="sound" class="text-primary text-3xl"></span>
      <span class="text-primary font-bold text-2xl tracking-widest uppercase">Jingle Machine</span>
    </div>

    <div class="flex items-center gap-5">
      <button ui-button variant="primary" (click)="openCreate()">
        <span nz-icon nzType="plus"></span>
        Aggiungi file
      </button>
      @if (youtubeAvailable()) {
        <button ui-button variant="youtube" (click)="openYoutube()">
          <span nz-icon nzType="youtube"></span>
          Carica da Youtube
        </button>
      }
      <button ui-button variant="neutral" (click)="logout()">
        <span nz-icon nzType="logout" class="text-white/60"></span>
      </button>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="flex flex-col px-10 pb-10">
    <div class="bg-surface rounded-2xl p-15 flex-1 flex flex-col gap-10">

      <!-- Title + search -->
      <div class="flex items-center justify-between">
        <h1 class="text-3xl font-semibold text-fg">I tuoi Jingle</h1>
        <div class="flex items-center gap-2 h-(--control-height) px-5 rounded-full bg-control cursor-text">
          <span nz-icon nzType="search" class="text-muted"></span>
          <input
            class="bg-transparent border-none outline-none text-fg placeholder:text-muted text-lg font-semibold w-48"
            placeholder="Cerca..."
            [ngModel]="search()"
            (ngModelChange)="search.set($event)"
          />
        </div>
      </div>

      <!-- Grid -->
      <nz-spin [nzSpinning]="loading()">
        @if (filtered().length === 0 && !loading()) {
          <div class="flex flex-col items-center justify-center py-20 text-white/25">
            <span nz-icon nzType="sound" class="text-6xl mb-4"></span>
            <p class="text-lg">Nessun jingle trovato.</p>
          </div>
        } @else {
          <div class="grid grid-cols-4 gap-6.5 max-[1200px]:grid-cols-3 max-[900px]:grid-cols-2 max-[600px]:grid-cols-1">
            @for (jingle of filtered(); track jingle.id) {
              <app-jingle-item
                [jingle]="jingle"
                (editRequest)="openEdit($event)"
                (deleteRequest)="confirmDelete($event)"
              />
            }
          </div>
        }
      </nz-spin>

    </div>
  </main>

</div>

<!-- Modals -->
<app-youtube-import-modal (imported)="onYoutubeImported($event)" />
<app-create-jingle-modal (saved)="onSaved()" />
<app-edit-jingle-modal (saved)="onSaved()" />
