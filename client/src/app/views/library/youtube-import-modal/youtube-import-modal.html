<nz-modal
  [nzVisible]="visible()"
  [nzTitle]="title"
  [nzFooter]="footer"
  [nzWidth]="600"
  (nzOnCancel)="close()"
>
  <ng-container *nzModalContent>
    <nz-spin [nzSpinning]="busy()">

      @if (step() === 'url') {
        <div class="py-2">
          <input
            nz-input
            nzSize="large"
            placeholder="https://www.youtube.com"
            [ngModel]="url()"
            (ngModelChange)="url.set($event)"
            (keydown.enter)="checkUrl()"
          />
        </div>
      } @else {
        <div class="space-y-5 py-2">

          <!-- Video card with preview play/pause -->
          <div class="flex items-center gap-4 bg-page rounded-xl p-4">
            @if (info()?.thumbnail) {
              <img [src]="info()!.thumbnail" alt="" class="w-28 h-16 object-cover rounded-lg shrink-0" />
            }
            <div class="min-w-0 flex-1">
              <p class="text-fg font-semibold leading-tight line-clamp-1">{{ info()?.title }}</p>
              <p class="text-muted text-sm line-clamp-1">{{ info()?.uploader }}</p>
              <p class="text-muted text-sm">{{ formatTime(info()?.durationSeconds ?? 0) }}</p>
            </div>
            <button
              class="bg-transparent border-none cursor-pointer p-0 leading-none shrink-0 disabled:opacity-50"
              [disabled]="previewLoading() || !previewReady()"
              (click)="togglePreview()"
            >
              @if (previewLoading()) {
                <span nz-icon nzType="loading" nzSpin class="text-[40px] text-primary"></span>
              } @else {
                <span nz-icon [nzType]="previewing() ? 'pause-circle' : 'play-circle'" class="text-[40px] text-fg"></span>
              }
            </button>
          </div>

          <!-- Cut interval -->
          <div>
            <nz-slider
              nzRange
              [nzMin]="0"
              [nzMax]="info()?.durationSeconds ?? 0"
              [nzTipFormatter]="formatTime"
              [ngModel]="range()"
              (ngModelChange)="onRangeChange($event)"
            />
            <div class="flex items-center justify-between mt-1">
              <span class="px-3 py-1 rounded-full bg-page text-muted text-xs font-mono">{{ formatTime(range()[0]) }}</span>
              <span class="px-3 py-1 rounded-full bg-page text-muted text-xs font-mono">{{ formatTime(range()[1]) }}</span>
            </div>
          </div>

        </div>
      }

    </nz-spin>
  </ng-container>
</nz-modal>

<!-- Title (same for both steps, per the mockup) -->
<ng-template #title>Carica da Youtube</ng-template>

<!-- Footer -->
<ng-template #footer>
  <div class="flex justify-end gap-3">
    <button ui-button variant="neutral" [disabled]="busy()" (click)="close()">Annulla</button>
    @if (step() === 'url') {
      <button ui-button variant="primary" [disabled]="busy()" (click)="checkUrl()">Continua</button>
    } @else {
      <button ui-button variant="primary" [disabled]="busy()" (click)="proceed()">Continua</button>
    }
  </div>
</ng-template>
