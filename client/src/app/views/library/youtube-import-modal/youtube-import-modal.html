<!-- nzMaskClosable=false: releasing a trim-slider drag over the mask would
     otherwise generate a click on the mask and close the modal mid-edit. -->
<nz-modal
  [nzVisible]="visible()"
  [nzTitle]="title"
  [nzFooter]="footer"
  [nzWidth]="600"
  [nzMaskClosable]="false"
  (nzOnCancel)="close()"
>
  <ng-container *nzModalContent>
    <nz-spin [nzSpinning]="busy()">

      @if (step() === 'url') {
        <div class="py-2">
          <input
            nz-input
            nzSize="large"
            placeholder="https://www.youtube.com"
            [ngModel]="url()"
            (ngModelChange)="url.set($event)"
            (keydown.enter)="checkUrl()"
          />
        </div>
      } @else {
        <div class="space-y-10 py-2">

          <!-- Video preview + play -->
          <div class="flex items-center gap-4 bg-page rounded-lg p-3">
            @if (info()?.thumbnail) {
              <img [src]="info()!.thumbnail" alt="" class="w-20 h-20 object-cover rounded-lg shrink-0" />
            }
            <div class="min-w-0 flex-1">
              <p class="text-2xl font-semibold text-fg line-clamp-1">{{ info()?.title }}</p>
              <p class="text-lg text-muted line-clamp-1">{{ info()?.uploader }}</p>
              <p class="text-base text-muted">{{ formatTime(info()?.durationSeconds ?? 0) }}</p>
            </div>
            <button
              class="shrink-0 w-11 h-11 flex items-center justify-center rounded-full border-2 border-fg/60 text-fg
                     bg-transparent cursor-pointer transition hover:border-primary hover:text-primary disabled:opacity-50"
              [disabled]="previewLoading() || !previewReady()"
              (click)="togglePreview()"
            >
              @if (previewLoading()) {
                <span nz-icon nzType="loading" nzSpin class="text-lg"></span>
              } @else {
                <span nz-icon [nzType]="previewing() ? 'pause' : 'caret-right'" class="text-lg"></span>
              }
            </button>
          </div>

          <!-- Cut interval (the playhead appears once the preview audio is ready) -->
          <ui-trim-slider
            [max]="info()?.durationSeconds ?? 0"
            [step]="0.1"
            [value]="range()"
            (valueChange)="onRangeChange($event)"
            [format]="formatTime"
            [cursor]="previewReady() ? previewTime() : null"
          />

        </div>
      }

    </nz-spin>
  </ng-container>
</nz-modal>

<!-- Title (same for both steps, per the mockup) -->
<ng-template #title>Carica da YouTube</ng-template>

<!-- Footer -->
<ng-template #footer>
  <div class="flex justify-end gap-3">
    <button ui-button variant="neutral" [disabled]="busy()" (click)="close()">Annulla</button>
    @if (step() === 'url') {
      <button ui-button variant="primary" [disabled]="busy()" (click)="checkUrl()">Continua</button>
    } @else {
      <button ui-button variant="primary" [disabled]="busy()" (click)="proceed()">Continua</button>
    }
  </div>
</ng-template>
