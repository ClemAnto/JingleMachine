<div class="flex justify-center pt-16 px-4">
  <div class="w-full max-w-md bg-surface rounded-xl p-8 shadow-lg">
    <h1 class="text-fg text-2xl font-semibold mb-6">
      {{ mode() === 'register' ? 'Crea nuova utenza' : 'Accedi' }}
    </h1>

    @if (error()) {
      <nz-alert nzType="error" [nzMessage]="error()!" class="mb-4" nzShowIcon></nz-alert>
    }

    <form nz-form nzLayout="vertical" [formGroup]="form" (ngSubmit)="submit()">
      <nz-form-item>
        <nz-form-label nzRequired>{{ emailMode ? 'Email' : 'Utente' }}</nz-form-label>
        <nz-form-control [nzErrorTip]="emailMode ? 'Inserisci un\'email valida.' : 'Da 3 a 20 caratteri: lettere, numeri, . _ - (niente spazi).'">
          @if (emailMode) {
            <input nz-input nzSize="large" type="email" formControlName="identifier"
              placeholder="nome@esempio.com" autocomplete="email" />
          } @else {
            <input nz-input nzSize="large" type="text" formControlName="identifier"
              placeholder="Il tuo nome utente" autocomplete="username" />
          }
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Password</nz-form-label>
        <nz-form-control nzErrorTip="Da 6 a 64 caratteri.">
          <nz-input-password>
            <input nz-input nzSize="large" formControlName="password"
              placeholder="••••••"
              [attr.autocomplete]="mode() === 'register' ? 'new-password' : 'current-password'" />
          </nz-input-password>
        </nz-form-control>
      </nz-form-item>

      @if (mode() === 'register') {
        <nz-form-item>
          <nz-form-label nzRequired>Conferma password</nz-form-label>
          <nz-form-control>
            <nz-input-password>
              <input nz-input nzSize="large" formControlName="confirmPassword"
                placeholder="••••••" autocomplete="new-password" />
            </nz-input-password>
          </nz-form-control>
        </nz-form-item>
      }

      <div class="flex flex-col gap-3 mt-2">
        @if (mode() === 'register') {
          <button ui-button variant="primary" class="w-full justify-center"
            [disabled]="loading()" type="submit">Crea utenza</button>
          <button ui-button variant="neutral" class="w-full justify-center"
            [disabled]="loading()" type="button" (click)="setMode('login')">Torna all'accesso</button>
        } @else {
          <button ui-button variant="primary" class="w-full justify-center"
            [disabled]="loading()" type="submit">Accedi</button>
          <button ui-button variant="neutral" class="w-full justify-center"
            [disabled]="loading()" type="button" (click)="setMode('register')">Crea nuova utenza</button>
        }
      </div>
    </form>

    @if (emailMode && mode() === 'login') {
      <div class="my-4 text-center text-xs text-muted">oppure</div>
      <button ui-button variant="neutral" class="w-full justify-center"
        [disabled]="loading()" type="button" (click)="google()">
        <span nz-icon nzType="google"></span>
        Continua con Google
      </button>
    }
  </div>
</div>
