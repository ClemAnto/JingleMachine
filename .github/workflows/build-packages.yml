name: Build packages (Electron)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Needed by the release step (publishes the installers on tag builds).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: jingle-machine-win
          - os: macos-latest
            artifact: jingle-machine-mac
    runs-on: ${{ matrix.os }}

    # bash is available on all runners (Git Bash on Windows) → uniform cp/commands.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      # ── 1. Build Angular app ────────────────────────────────────────────
      - name: Install client dependencies
        run: npm ci
        working-directory: client

      # No --base-href: the embedded server serves the app at root, which is
      # Angular's default ("/"). Passing "--base-href /" would be mangled by Git
      # Bash on the Windows runner (a lone "/" becomes "C:/Program Files/Git/").
      - name: Build Angular (served at root by the embedded server)
        run: npm run build
        working-directory: client

      # ── 2. Copy Angular dist into server/app for bundling ───────────────
      - name: Copy Angular dist → server/app
        run: |
          rm -rf server/app
          cp -r client/dist/jingle-machine/browser server/app

      # ── 3. Install server dependencies ─────────────────────────────────
      - name: Enable Corepack (required for Yarn 4)
        run: corepack enable

      - name: Install server dependencies
        run: yarn install
        working-directory: server

      # ── 4. Build the Electron app (NSIS installer on Win, dmg on mac) ───
      # --publish never + no GH_TOKEN: we only want the installers as build
      # artifacts (step 5), not a GitHub Release. If GH_TOKEN is set,
      # electron-builder auto-configures a GitHub publish provider and crashes
      # generating update metadata ("Cannot read properties of null (reading
      # 'provider')" / "Cannot detect repository by .git/config"). Leaving the
      # token unset keeps it fully offline; the Electron binary download still works.
      - name: Build Electron app
        run: yarn dist --publish never
        working-directory: server

      # ── 5. Upload installers ────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          retention-days: 30
          path: |
            server/dist-electron/*.exe
            server/dist-electron/*.dmg

      # ── 6. Publish to a GitHub Release (tag builds only) ────────────────
      # The Release gives colleagues a public download link (CI artifacts need
      # a GitHub login) and feeds the in-app update check (/releases/latest).
      # GH_TOKEN is scoped to THIS step only: it must never reach "yarn dist"
      # (see the note on step 4).
      - name: Publish installers to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(server/dist-electron/*.exe server/dist-electron/*.dmg)
          # Both matrix legs run this: the first creates the release, the other
          # finds it (the trailing "|| true" covers the create/create race).
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "Jingle Machine $GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
