name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari per la pubblicazione su GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy concorrenti.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # L'app Angular vive nella cartella client/: tutti i comandi girano lì.
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      # base-href = /<nome-repo>/ così gli asset si risolvono sul sottopercorso di Pages.
      - name: Build
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      # GitHub Pages non conosce le rotte Angular: serviamo index.html anche sui 404
      # così i deep-link (es. /login) funzionano dopo un refresh.
      - name: SPA fallback (404 -> index)
        run: cp dist/jingle-machine/browser/index.html dist/jingle-machine/browser/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: client/dist/jingle-machine/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
